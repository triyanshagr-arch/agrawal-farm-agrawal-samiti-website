<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Agrawal Samaj Samiti</title>
    <!-- Use the same CSS file for base styling -->
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: var(--primary-color); margin: 0; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary-color); color: white; }
        tr:hover { background-color: #f9f9f9; }
        
        /* Badges */
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-pending { background-color: #ffeeba; color: #856404; }
        .status-approved { background-color: #d4edda; color: #155724; }
        .status-rejected { background-color: #f8d7da; color: #721c24; }
        
        /* Buttons */
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; margin: 2px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-view { background-color: #17a2b8; }
        .btn-approve { background-color: #28a745; }
        .btn-reject { background-color: #dc3545; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; }
        .login-box input { padding: 10px; margin: 10px 0; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Image Modal */
        #image-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #image-modal img { max-width: 90%; max-height: 80%; border: 5px solid white; border-radius: 4px; }
        .close-modal { color: white; font-size: 30px; position: absolute; top: 20px; right: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary-color);">Admin Login</h2>
            <p>Please enter the admin password</p>
            <input type="password" id="admin-password" placeholder="Password">
            <br>
            <button class="btn btn-primary" onclick="login()">Login</button>
        </div>
    </div>

    <!-- Image View Modal -->
    <div id="image-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modal-title" style="color: white; margin-bottom: 20px;">Image</h3>
        <img id="modal-img" src="" alt="View">
    </div>

    <div class="admin-container" id="admin-content" style="display: none;">
        <div class="header">
            <h1>Admin Dashboard - Membership Applications</h1>
            <button class="btn btn-primary" onclick="loadMembers()">Refresh Data</button>
        </div>

        <table id="members-table">
            <thead>
                <tr>
                    <th>ID / Date</th>
                    <th>Applicant Name</th>
                    <th>Contact</th>
                    <th>Payment Ref</th>
                    <th>Files</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="members-tbody">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>

    <script>
        let adminToken = "";
        let membersData = []; // Store globally to avoid string escaping issues

        function login() {
            const pwd = document.getElementById('admin-password').value;
            if(!pwd) return alert('Enter password');
            adminToken = pwd;
            loadMembers();
        }

        async function loadMembers() {
            try {
                const response = await fetch('/api/admin/members', {
                    headers: { 'Authorization': adminToken }
                });
                
                if (response.status === 401) {
                    alert('Invalid Password!');
                    return;
                }
                
                const data = await response.json();
                
                if (data.members) {
                    membersData = data.members; // Save to global
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-content').style.display = 'block';
                    renderTable(membersData);
                }
            } catch (err) {
                console.error(err);
                alert('Error loading members. Is the server running?');
            }
        }

        function renderTable(members) {
            const tbody = document.getElementById('members-tbody');
            tbody.innerHTML = '';

            members.forEach(m => {
                const tr = document.createElement('tr');
                
                let statusClass = 'status-pending';
                if(m.status === 'Approved') statusClass = 'status-approved';
                if(m.status === 'Rejected') statusClass = 'status-rejected';

                const dateStr = new Date(m.created_at).toLocaleString();

                tr.innerHTML = `
                    <td>
                        <strong>${m.membership_no}</strong><br>
                        <small style="color: #777;">${dateStr}</small>
                    </td>
                    <td>
                        <strong>${m.title} ${m.fullName}</strong><br>
                        <small>Father: ${m.guardianName}</small>
                    </td>
                    <td>
                        📞 ${m.mobileNumber}<br>
                        ✉️ ${m.emailId || 'N/A'}
                    </td>
                    <td>
                        Txn: ${m.transactionId}<br>
                        Acct: ${m.bankAccountName}
                    </td>
                    <td>
                        <button class="btn-sm btn-view" onclick="viewImage(${m.id}, 'applicantPhoto', 'Applicant Photo')">Photo</button>
                        <button class="btn-sm btn-view" onclick="viewImage(${m.id}, 'paymentScreenshot', 'Payment Screenshot')">Payment</button>
                    </td>
                    <td>
                        <span class="status-badge ${statusClass}">${m.status}</span>
                    </td>
                    <td>
                        <button class="btn-sm btn-approve" onclick="updateStatus(${m.id}, 'Approved')">Approve</button>
                        <button class="btn-sm btn-reject" onclick="updateStatus(${m.id}, 'Rejected')">Reject</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateStatus(id, newStatus) {
            if(!confirm(`Are you sure you want to mark this as ${newStatus}?`)) return;

            try {
                const response = await fetch(`/api/admin/members/${id}/status`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': adminToken 
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                
                const data = await response.json();
                if(data.success) {
                    if (newStatus === 'Approved') {
                        const member = membersData.find(m => m.id === id);
                        if (member) {
                            try {
                                alert('Generating PDFs... Please wait a moment.');
                                
                                // Format path for Windows compatibility
                                const photoPath = member.applicantPhoto && member.applicantPhoto !== 'null' ? '/' + member.applicantPhoto.replace(/\\/g, '/') : null;
                                const sigPath = member.applicantSignature && member.applicantSignature !== 'null' ? '/' + member.applicantSignature.replace(/\\/g, '/') : null;

                                generateReceiptPDF(member.membership_no, member);
                                await generateFilledTemplate(member.membership_no, member, photoPath, sigPath);
                            } catch (e) {
                                console.error('PDF Error:', e);
                                alert('Approved successfully, but failed to generate PDFs locally.');
                            }
                        }
                    }
                    loadMembers(); // reload table
                } else {
                    alert('Error: ' + data.error);
                }
            } catch(err) {
                console.error(err);
                alert('Error updating status');
            }
        }

        function viewImage(id, field, title) {
            const member = membersData.find(m => m.id === id);
            let path = member ? member[field] : null;
            
            if (!path || path === 'null') return alert('No image uploaded');
            
            // Fix Windows backslashes
            const correctedPath = path.replace(/\\/g, '/');
            document.getElementById('modal-img').src = '/' + correctedPath;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="pdf_generator.js"></script>
</body>
</html>

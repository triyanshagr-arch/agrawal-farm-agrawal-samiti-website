<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>टिकट स्कैनर | Event Scanner - Agrawal Samiti</title>
    <link rel="icon" href="images/maharaj_agrasen.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            background-color: #d32f2f;
            width: 100%;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .scanner-container {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            padding: 15px;
            box-sizing: border-box;
        }
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #000;
        }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            transition: all 0.3s ease;
        }
        .result-box h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }
        .result-box p {
            margin: 5px 0;
            font-size: 1.2rem;
        }
        .btn-scan-again {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
        }
        .status-valid {
            background-color: #2e7d32;
            box-shadow: 0 0 30px rgba(46, 125, 50, 0.6);
        }
        .status-invalid {
            background-color: #c62828;
            box-shadow: 0 0 30px rgba(198, 40, 40, 0.6);
        }
        #loader {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-qrcode"></i> Event Scanner</h1>
    </div>
    
    <div class="scanner-container">
        <div id="reader"></div>
        
        <div id="loader">
            <div class="spinner"></div>
            <p>Verifying Ticket...</p>
        </div>

        <div id="resultBox" class="result-box">
            <h2 id="resultTitle">Valid!</h2>
            <p id="resultMessage">Welcome, Name!</p>
            <p id="resultGuests" style="font-weight: bold;"></p>
            <button class="btn-scan-again" onclick="resumeScanning()"><i class="fas fa-camera"></i> Scan Next Ticket</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOrs-sG-R5lqSNhggWDxTwgGyN2JSKjDcGFgXZgpfo_0IJLcMME1EyzZRTWmHaQAuC/exec";
        let html5QrcodeScanner;
        let isProcessing = false;

        document.addEventListener("DOMContentLoaded", () => {
            startScanner();
        });

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: {width: 250, height: 250} },
                /* verbose= */ false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return; // Prevent multiple scans
            isProcessing = true;
            
            // Pause scanner UI
            html5QrcodeScanner.pause();
            
            // Show loader
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Verify with Backend
            verifyTicket(decodedText);
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning.
        }

        async function verifyTicket(ticketId) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'verify_ticket',
                        ticketId: ticketId
                    })
                });
                const data = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                const resultBox = document.getElementById('resultBox');
                resultBox.style.display = 'block';

                if (data.success) {
                    resultBox.className = 'result-box status-valid';
                    document.getElementById('resultTitle').innerHTML = '<i class="fas fa-check-circle"></i> VALID TICKET';
                    document.getElementById('resultMessage').innerText = 'Attendee: ' + data.attendeeName;
                    document.getElementById('resultGuests').innerText = 'Guests allowed: ' + data.guests;
                    
                    // Optional beep sound for success
                    playBeep(800);
                } else {
                    resultBox.className = 'result-box status-invalid';
                    document.getElementById('resultTitle').innerHTML = '<i class="fas fa-times-circle"></i> INVALID';
                    document.getElementById('resultMessage').innerText = data.error || 'Ticket not found or already scanned.';
                    document.getElementById('resultGuests').innerText = '';
                    
                    // Low error beep
                    playBeep(300);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loader').style.display = 'none';
                alert("Network error connecting to verification server.");
                isProcessing = false;
                html5QrcodeScanner.resume();
            }
        }

        function resumeScanning() {
            document.getElementById('resultBox').style.display = 'none';
            isProcessing = false;
            html5QrcodeScanner.resume();
        }

        // Simple Beep function
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square';
            oscillator.frequency.value = frequency;
            oscillator.start();
            setTimeout(() => oscillator.stop(), 200);
        }
    </script>
</body>
</html>
